name: Build and Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (e.g., v1.2.3)"
        required: true
        type: string
      release_type:
        description: "Type of release"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - pre-release

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}

      - name: Resolve release tag and app version
        id: release_vars
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag_name }}"
            if [[ "${{ github.event.inputs.release_type }}" == "pre-release" ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" =~ alpha|beta|rc|pre ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi
          # GITHUB_REF_NAME is the branch on workflow_dispatch, not the tag — derive from tag only.
          VERSION_NAME="${TAG#v}"
          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          else
            echo "::warning::Tag '$TAG' is not semver vX.Y.Z; using run number for versionCode."
            VERSION_CODE="${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build Release APK
        run: bash ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          APP_VERSION_NAME: ${{ steps.release_vars.outputs.version_name }}
          APP_VERSION_CODE: ${{ steps.release_vars.outputs.version_code }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/app-release.apk"
          tag: ${{ steps.release_vars.outputs.tag }}
          name: Release ${{ steps.release_vars.outputs.tag }}
          body: |
            Signed release APK for **${{ steps.release_vars.outputs.tag }}** (versionName `${{ steps.release_vars.outputs.version_name }}`, versionCode `${{ steps.release_vars.outputs.version_code }}`, commit ${{ github.sha }}).
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: ${{ steps.release_vars.outputs.prerelease }}
